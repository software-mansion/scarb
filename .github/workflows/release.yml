name: Release

on:
  push:
    tags:
      - v[0-9]+.*

permissions: {}

jobs:
  check:
    uses: ./.github/workflows/_check-release.yml

  release:
    uses: ./.github/workflows/_build-release.yml
    with:
      scarb-tag: ${{ github.ref_name }}
      full-verify: true

  draft:
    name: draft release
    runs-on: ubuntu-latest
    needs: [ check, release ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts-dl

      - name: Unpack artifacts to staging directory
        run: |
          mkdir -p artifacts
          mv artifacts-dl/build-*/scarb-* artifacts/
          mv artifacts-dl/checksums/* artifacts/
          ls -lh artifacts/

      - name: Draft GitHub release
        run: |
          gh release create \
            "${RELEASE_TAG}" \
            ./artifacts/* \
            --draft \
            --title "${RELEASE_TAG}" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
